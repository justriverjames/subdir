name: subdir-archiver

networks:
  archiver-network:
    name: subdir-archiver-network
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: subdir-archiver-db
    networks:
      - archiver-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reddit_archiver}
      POSTGRES_USER: ${POSTGRES_USER:-archiver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - subdir-archiver-postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archiver} -d ${POSTGRES_DB:-reddit_archiver}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c max_connections=50

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: subdir-archiver:latest
    container_name: subdir-archiver-app
    networks:
      - archiver-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Reddit API credentials
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
      REDDIT_USERNAME: ${REDDIT_USERNAME}
      REDDIT_PASSWORD: ${REDDIT_PASSWORD}
      USER_AGENT: ${USER_AGENT}
      # PostgreSQL (override for Docker network)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-reddit_archiver}
      POSTGRES_USER: ${POSTGRES_USER:-archiver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Archival settings
      MIN_SUBSCRIBERS: ${MIN_SUBSCRIBERS:-5000}
      MAX_POSTS_PER_SUBREDDIT: ${MAX_POSTS_PER_SUBREDDIT:-2000}
      MAX_COMMENTS_PER_POST: ${MAX_COMMENTS_PER_POST:-500}
      MAX_COMMENT_DEPTH: ${MAX_COMMENT_DEPTH:-5}
      FILTER_BOTS: ${FILTER_BOTS:-true}
      # Rate limiting
      REQUESTS_PER_MINUTE: ${REQUESTS_PER_MINUTE:-60}
      REQUESTS_PER_10_SECONDS: ${REQUESTS_PER_10_SECONDS:-10}
      REQUESTS_PER_SECOND: ${REQUESTS_PER_SECOND:-2}
      # Workers
      METADATA_ENABLED: ${METADATA_ENABLED:-true}
      THREADS_ENABLED: ${THREADS_ENABLED:-true}
      COMMENTS_ENABLED: ${COMMENTS_ENABLED:-false}
      # Budget weights
      METADATA_WEIGHT: ${METADATA_WEIGHT:-0.2}
      THREADS_WEIGHT: ${THREADS_WEIGHT:-0.6}
      COMMENTS_WEIGHT: ${COMMENTS_WEIGHT:-0.2}
      # Comments config
      COMMENTS_BATCH_SIZE: ${COMMENTS_BATCH_SIZE:-5}
      COMMENTS_COOLDOWN: ${COMMENTS_COOLDOWN:-300}
      # Metadata worker
      CSV_PATH: ${CSV_PATH:-/app/data/subreddits_to_scan.csv}
      SCANNER_DB_PATH: ${SCANNER_DB_PATH:-/app/data/subreddit_scanner.db}
      STALE_THRESHOLD_DAYS: ${STALE_THRESHOLD_DAYS:-30}
      # Anti-detection
      BREAK_AFTER_SUBS_MIN: ${BREAK_AFTER_SUBS_MIN:-10}
      BREAK_AFTER_SUBS_MAX: ${BREAK_AFTER_SUBS_MAX:-25}
      BREAK_DURATION_MIN: ${BREAK_DURATION_MIN:-60}
      BREAK_DURATION_MAX: ${BREAK_DURATION_MAX:-300}
      LONG_BREAK_PROBABILITY: ${LONG_BREAK_PROBABILITY:-0.05}
      SHUFFLE_ORDER: ${SHUFFLE_ORDER:-true}
      # Batch processing
      BATCH_SIZE: ${BATCH_SIZE:-1}
      # Pause between subreddits
      SUBREDDIT_PAUSE_MIN: ${SUBREDDIT_PAUSE_MIN:-30}
      SUBREDDIT_PAUSE_MAX: ${SUBREDDIT_PAUSE_MAX:-60}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8480:8480"
    volumes:
      # Source code mounts for hot-reload
      - ../scanner:/app/scanner
      - ../webui:/app/webui
      - ../migrations:/app/migrations
      - ./logs:/app/logs
      - ./.env:/app/.env
      # Data files
      - ${SCANNER_DB_HOST_PATH:-/Users/river/code/justriverjames/subdir/data/subreddit_scanner.db}:/app/data/subreddit_scanner.db
      - ${CSV_HOST_PATH:-/Users/river/code/justriverjames/subdir/data/subreddits_to_scan.csv}:/app/data/subreddits_to_scan.csv
      - ../priority_subreddits.csv:/app/priority_subreddits.csv:ro
    command: uvicorn webui.main:app --host 0.0.0.0 --port 8480 --reload --reload-dir /app/scanner --reload-dir /app/webui
    restart: unless-stopped

volumes:
  subdir-archiver-postgres-data:
    name: subdir-archiver-postgres-data
    driver: local
